[tool.black]
color = true
line-length = 120
target-version = ['py310']
skip-string-normalization = true

[tool.pyright]
include = ["lahuta"]
exclude = ["lahuta/scripts", "**/__pycache__", "cachedir"]
defineConstant = { DEBUG = true }
reportMissingImports = true
reportMissingTypeStubs = "none"

[build-system]
requires = ["setuptools", "wheel"]

[tool.pylint.basic]
good-names = [
    'df', 
    'ag', 
    'ns',
    'ix',
]

[tool.pylint.messages_control]

max-line-length = 120

disable = [
#   "missing-docstring",
#   "unused-argument",
#   "no-value-for-parameter",
#   "no-member",
#   "no-else-return",
#   "bad-whitespace",
#   "bad-continuation",
  "line-too-long",
  "fixme",
#   "protected-access",
#   "too-few-public-methods",
]

[tool.mypy]
python_version = 3.10
check_untyped_defs = true
disallow_any_generics = true
ignore_missing_imports = true
warn_no_return = true
warn_return_any = true
warn_unused_configs = true
warn_unused_ignores = false
disallow_untyped_defs = true
disallow_untyped_calls = true
strict_optional = true
no_implicit_optional = true
strict_equality = true
strict = true

[tool.pytest.ini_options]
testpaths = ["lahuta"]
filterwarnings = [
    "ignore::RuntimeWarning:lahuta.contacts.sulphur_pi",
    "ignore::RuntimeWarning:lahuta.contacts.carbon_pi",
    "ignore::RuntimeWarning:lahuta.contacts.cation_pi",
    "ignore::RuntimeWarning:lahuta.contacts.donor_pi",
]
