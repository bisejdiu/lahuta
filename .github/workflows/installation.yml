name: Test Conda Installation

on:
  push:
    branches:
      - conda_pub_test

jobs:
  test-conda-install:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2
      
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Add Conda to System Path
        run: |
          echo $CONDA/bin >> $GITHUB_PATH
      
      - name: Create and Activate Conda Environment
        run: |
          conda create --name test-env python=${{ matrix.python-version }}
          echo "conda activate test-env" >> $GITHUB_PATH
      
      - name: Install Library
        run: |
          conda install -c conda-forge -c bisejdiu lahuta
      
      - name: Test Library Installation
        run: |
          python -c "import lahuta"
          python -c "import unittest; from lahuta.scripts.only_aromatic import SimpleTest; unittest.TextTestRunner().run(unittest.TestLoader().loadTestsFromTestCase(SimpleTest))"
          python -c "import unittest; from lahuta.scripts.fast_contacts import ContactTest; unittest.TextTestRunner().run(unittest.TestLoader().loadTestsFromTestCase(ContactTest))"
