name: Core CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core:
    name: Build and Test C++ Core
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            install_cmd: |
              sudo apt-get update
              sudo apt-get install -y --no-install-recommends \
                build-essential cmake ninja-build zlib1g-dev ca-certificates git jq
              sudo apt-get install -y --no-install-recommends rustc cargo
          - os: macos-latest
            install_cmd: |
              brew install cmake ninja jq rust
          - os: windows-latest
            # we'll run this step in pwsh explicitly
            win_install_cmd: |
              choco install -y cmake ninja jq
              if (!(Get-Command rustc -ErrorAction SilentlyContinue)) {
                choco install -y rust
              }

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies (Linux/macOS)
        if: runner.os != 'Windows'
        run: ${{ matrix.install_cmd }}

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ${{ matrix.win_install_cmd }}

      - name: Configure
        run: |
          cmake -S core -B core/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLAHUTA_VENDOR_BOOST=ON \
            -DLAHUTA_BUILD_PYTHON=OFF \
            -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build core/build --parallel

      - name: Test CLI runs
        run: |
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            EXE=./core/build/lahuta.exe
          else
            EXE=./core/build/lahuta
          fi
          "$EXE" --help

      - name: Run CLI, get contacts and verify
        run: |
          set -euxo pipefail
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            EXE=./core/build/lahuta.exe
          else
            EXE=./core/build/lahuta
          fi

          "$EXE" -f data/ubi.cif -p molstar
          test -f contacts.jsonl
          n=$(jq -r 'select(.num_contacts) | .num_contacts' contacts.jsonl | tail -n1 || echo 0)
          echo "num_contacts=$n"
          test "$n" = "153"

          "$EXE" -f data/ubi.cif -p arpeggio
          test -f contacts.jsonl
          n=$(jq -r 'select(.num_contacts) | .num_contacts' contacts.jsonl | tail -n1 || echo 0)
          echo "num_contacts=$n"
          test "$n" = "384"

      - name: Run tests
        run: ctest --test-dir core/build --output-on-failure
