name: Core CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  core:
    name: Build and Test C++ Core (${{ matrix.os }} - ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-13, macos-15]
        include:
          - os: ubuntu-latest
            arch: x64
            install_cmd: |
              sudo apt-get update
              sudo apt-get install -y --no-install-recommends \
                build-essential cmake ninja-build zlib1g-dev ca-certificates git jq
              sudo apt-get install -y --no-install-recommends rustc cargo
          - os: macos-13
            arch: intel
            install_cmd: |
              brew install cmake ninja jq
          - os: macos-15
            arch: arm64
            install_cmd: |
              brew install cmake ninja jq

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: ${{ matrix.install_cmd }}

      - name: Install Rus
        if: runner.os == 'macOS'
        uses: dtolnay/rust-toolchain@stable

      - name: Verify Rust installation
        run: |
          which rustc || echo "rustc not found in PATH"
          which cargo || echo "cargo not found in PATH"
          rustc --version || echo "rustc --version failed"
          cargo --version || echo "cargo --version failed"
          if command -v rustup >/dev/null 2>&1; then
            rustup show || true
            rustup toolchain list --verbose || true
          fi
          echo "PATH: $PATH"

      - name: Configure
        run: |
          set -euo pipefail
          RUST_FLAGS=""
          if [ "$RUNNER_OS" = "macOS" ]; then
            RUST_FLAGS="-DRust_COMPILER=$(rustup which rustc) -DRust_CARGO=$(rustup which cargo)"
          fi
          cmake -S core -B core/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLAHUTA_VENDOR_BOOST=ON   \
            -DLAHUTA_BUILD_PYTHON=OFF  \
            -DBUILD_TESTING=ON         \
            $RUST_FLAGS

      - name: Build
        run: cmake --build core/build --parallel

      - name: Test CLI runs
        run: ./core/build/lahuta --help

      - name: Run CLI, get contacts and verify
        run: |
          set -euxo pipefail
          ./core/build/lahuta -f data/ubi.cif -p molstar
          test -f contacts.jsonl
          n=$(jq -r 'select(.num_contacts) | .num_contacts' contacts.jsonl | tail -n1 || echo 0)
          echo "num_contacts=$n"
          test "$n" = "156"

          ./core/build/lahuta -f data/ubi.cif -p arpeggio
          test -f contacts.jsonl
          n=$(jq -r 'select(.num_contacts) | .num_contacts' contacts.jsonl | tail -n1 || echo 0)
          echo "num_contacts=$n"
          test "$n" = "384"

      - name: Run tests
        run: |
          set -euo pipefail

          if command -v nproc >/dev/null 2>&1; then
            JOBS=$(nproc)
          else
            JOBS=$(sysctl -n hw.logicalcpu)
          fi

          mkdir -p core/build/test-results core/build/gtest-results

          REPO_ROOT="$(pwd)"
          export GTEST_OUTPUT="xml:${REPO_ROOT}/core/build/gtest-results/"
          ctest --test-dir core/build \
                --output-on-failure   \
                --no-tests=error      \
                --parallel "${JOBS}"
                # --output-junit "${REPO_ROOT}/core/build/test-results/junit-${{ matrix.os }}-${{ matrix.arch }}.xml"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            core/build/test-results/*.xml
            core/build/gtest-results/*.xml
          retention-days: 14

      # - name: Publish test report
      #   if: always()
      #   uses: dorny/test-reporter@v2
      #   with:
      #     name: unit tests (${{ matrix.os }}-${{ matrix.arch }})
      #     path: core/build/test-results/*.xml
      #     reporter: java-junit
      #     fail-on-empty: true
