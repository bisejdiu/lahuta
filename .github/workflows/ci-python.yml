name: Python Package CI

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

jobs:
  python:
    name: Build and Test Python Package (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        shell: bash
        run: |
          set -euxo pipefail
          if command -v sudo >/dev/null 2>&1; then SUDO=sudo; else SUDO=""; fi
          $SUDO apt-get update
          $SUDO apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build zlib1g-dev ca-certificates git \
            rustc cargo

      - name: Upgrade pip tooling and install test dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install pytest hypothesis

      - name: Build and install package (scikit-build-core)
        working-directory: interop/python
        run: |
          pip install . -v

      - name: Import check
        run: |
          python -c "import lahuta; print('Success! lahuta imported.')"

      - name: Run example script
        run: |
          python interop/python/examples/lahuta_system_create.py

      - name: Run tests
        env:
          PYTHONWARNINGS: default
        run: |
          pytest
