name: Linting, Typechecking & Testing

on:
  push:
    branches: ["main", "dev", "feature/*"]

jobs:
  test_lint_typecheck:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: Add conda to system path
      run: |
        echo $CONDA/bin >> $GITHUB_PATH
    - name: Create and activate Conda environment with Python ${{ matrix.python-version }}
      run: |
        conda create --name test_lint_check python=${{ matrix.python-version }} 
        conda create --name dssp python=${{ matrix.python-version }} 
        
        . /usr/share/miniconda/etc/profile.d/conda.sh
        conda activate dssp
  
    - name: Activation stuff
      run: |
        conda install -c salilab -c anaconda dssp libboost=1.73.0
        dssp_binary=$(which mkdssp)
        mkdir ${HOME}/bin
        ln -s $dssp_binary ${HOME}/bin/mkdssp
        echo $HOME/bin >> $GITHUB_PATH
    - name: Install dependencies from conda-forge
      run: |
        conda config --set solver classic

        . /usr/share/miniconda/etc/profile.d/conda.sh
        conda activate test_lint_check
        
        conda install -c conda-forge openbabel MDAnalysis gemmi typer httpx
        conda install -c conda-forge typing_extensions
        conda install -c bioconda mafft

    - name: Run tests with pytest
      run: |
        . /usr/share/miniconda/etc/profile.d/conda.sh
        conda activate test_lint_check
        conda install -c conda-forge pytest
        pytest
    - name: Run linting with ruff
      run: |
        . /usr/share/miniconda/etc/profile.d/conda.sh
        conda activate test_lint_check
        conda install -c conda-forge ruff
        ruff check .
    - name: Run type checking with mypy
      run: |
        . /usr/share/miniconda/etc/profile.d/conda.sh
        conda activate test_lint_check
        conda install -c conda-forge mypy
        mypy .
