name: Linting, Typechecking & Testing

on:
  push:
    branches: ["main", "dev"]

jobs:
  test_lint_typecheck:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5
      matrix:
        python-version: ['3.10', '3.11']

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Add conda to system path
      run: |
        echo $CONDA/bin >> $GITHUB_PATH
    - name: Create and activate Conda environment with Python ${{ matrix.python-version }}
      run: |
        conda create --name test_lint_typecheck python=${{ matrix.python-version }}
        echo "conda activate test_lint_typecheck" >> $GITHUB_PATH
    - name: Install dependencies from conda-forge
      run: |
        conda install -c conda-forge openbabel MDAnalysis gemmi typer
    - name: Run linting with ruff
      run: |
        conda install -c conda-forge ruff
        ruff check . 
    - name: Run tests with pytest
      run: |
        conda install pytest
        pytest
    - name: Run type checking with mypy
      run: |
        conda install -c conda-forge mypy
        mypy .
