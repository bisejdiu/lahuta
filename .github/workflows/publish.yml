name: Publish Conda Package

on:
  release:
    types: [published]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch Call
        run: |
          curl -X POST \
          -H "Authorization: token ${{ secrets.LAHUTA_GH_PAT }}" \
          -H "Accept: application/vnd.github.everest-preview+json" \
          "https://api.github.com/repos/bisejdiu/lahuta-conda-build/dispatches" \
          -d '{"event_type": "publish_trigger"}'
