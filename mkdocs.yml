site_name: Lahuta
site_description: Analysis of non-covalent interactions in biomolecular systems
strict: false
site_url: https://docs.lahuta.dev/

theme:
  name: 'material'
  palette:
  - media: "(prefers-color-scheme: light)"
    scheme: default
    primary: black
    accent: pink
    toggle:
      icon: material/weather-night
      name: "Switch to dark mode"
  - media: "(prefers-color-scheme: dark)"
    scheme: slate
    primary: black
    accent: pink
    toggle:
      icon: material/weather-sunny
      name: "Switch to light mode"
  features:
    - content.tabs.link
    - content.code.annotate
    - announce.dismiss
    - navigation.tabs
  logo: 'small-logo.svg'
  favicon: 'favicon.png'

repo_name: bisejdiu/lahuta
repo_url: https://github.com/bisejdiu/lahuta
edit_uri: edit/main/docs/
extra:
  version:
    provider: mike

extra_css:
  - stylesheets/extra.css

nav:
- Getting Started:
  - Welcome to Lahuta: index.md
  - Getting Help: help.md
  - Installation: install.md
  - Contributing: contributing.md
  - changelog.md
- Usage:
  - 'Introduction': usage/intro.md
  - 'Loading Data': usage/loading.md
  - Contacts:
    - Neighbors: usage/ns/neighbors.md
    - Contacts: usage/ns/contacts.md
    - 'Contact Types': usage/ns/contact_types.md
  - 'Complex Operations': usage/arithmetic.md
  - 'DataFrame Output': usage/frame.md
  - 'Plotting Contacts': usage/contact_plot.md
  - 'Contact Computer': usage/computer.md
- Tutorials:
  - 'Getting Started': tutorials/getting_started.md
  - 'Custom Contacts': tutorials/custom_contacts.md
  - 'Visualizing Contacts': tutorials/visualizing_contacts.md
- CLI: cli.md
- Blog:
  - blog/lahuta-dev.md
- API Documentation:
  - Core:
    - 'Luni': api/core/luni.md
    - 'NeighborPairs': api/core/neighbors.md
    - 'Finding Neighbors': api/core/searching.md
    - 'ARC': api/core/arc.md
    - 'Loaders': api/core/loaders.md
    - 'OpenBabel OBMol': api/core/obmol.md
    - 'Assigners': api/core/assigners.md
    - 'Atom Assigner': api/core/atom_assigner.md
    - 'Matchers': api/core/matchers.md
    - 'Helpers': api/core/helpers.md
  - Contacts:
    - 'Functional API': api/contacts/F.md
    - 'Object-Oriented API': 
      - 'Atom-Atom': api/contacts/atom_atom.md
      - 'Atom-Plane': api/contacts/atom_plane.md
      - 'Plane-Plane': api/contacts/plane_plane.md
  - Config:
    - 'Atom Types': api/config/atoms.md
    - 'Atom Type Definitions': api/config/atom_types.md
    - 'Defaults': api/config/defaults.md
    - 'SMARTS': api/config/smarts.md
    - 'SMARTS Definitions': api/config/smarts_defs.md
  - Utilities:
    - 'Array-Related Utils': api/utils/array.md
    - 'Math': api/utils/math.md
    - 'Atom Typing': api/utils/typing.md
    - 'H-Bound Atoms': api/utils/hbonded.md
    - 'MDAnalysis': api/utils/mdanalysis.md
    - 'OpenBabel': api/utils/openbabel.md
    - 'Radii Assignment': api/utils/radii.md
  

markdown_extensions:
- tables
- toc:
    permalink: true
    title: Page contents
- admonition
- pymdownx.details
- pymdownx.superfences
- pymdownx.highlight
- pymdownx.extra
- pymdownx.emoji:
    emoji_index: !!python/name:materialx.emoji.twemoji
    emoji_generator: !!python/name:materialx.emoji.to_svg
- pymdownx.tabbed:
    alternate_style: true

watch:
- lahuta

plugins:
- mike:
    alias_type: symlink
    canonical_version: latest
- search
- exclude:
    glob:
    - plugins/*
    - __pycache__/*
- mkdocstrings:
    handlers:
      python:
        paths: [.]
        options:
          members_order: source
          separate_signature: true
          filters: ["!^_"]
          docstring_options:
            ignore_init_summary: true
          merge_init_into_class: true
          extensions:
            - docs/plugins/griffe_doclinks.py
- mkdocs-simple-hooks:
    hooks:
      on_pre_build: 'docs.plugins.main:on_pre_build'
      on_files: 'docs.plugins.main:on_files'
      on_page_markdown: 'docs.plugins.main:on_page_markdown'
- external-markdown: